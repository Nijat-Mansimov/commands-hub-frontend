<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="180" height="180" fill="#0f172a" rx="40"/>
  
  <!-- Terminal/Command symbol -->
  <g transform="translate(45, 45)">
    <!-- Terminal window background -->
    <rect x="0" y="0" width="90" height="90" fill="none" stroke="url(#grad1)" stroke-width="2" rx="8"/>
    
    <!-- Terminal header -->
    <line x1="0" y1="15" x2="90" y2="15" stroke="url(#grad1)" stroke-width="1.5"/>
    
    <!-- Command prompt dots -->
    <circle cx="8" cy="7" r="1.5" fill="#ff6b6b"/>
    <circle cx="20" cy="7" r="1.5" fill="#ffd93d"/>
    <circle cx="32" cy="7" r="1.5" fill="#6bcf7f"/>
    
    <!-- Command lines (prompt symbols) -->
    <text x="5" y="35" font-family="monospace" font-size="10" fill="url(#grad1)" font-weight="bold">$</text>
    <line x1="15" y1="30" x2="70" y2="30" stroke="url(#grad1)" stroke-width="1.5" opacity="0.7"/>
    
    <text x="5" y="55" font-family="monospace" font-size="10" fill="url(#grad1)" font-weight="bold">$</text>
    <line x1="15" y1="50" x2="60" y2="50" stroke="url(#grad1)" stroke-width="1.5" opacity="0.7"/>
    
    <text x="5" y="75" font-family="monospace" font-size="10" fill="url(#grad1)" font-weight="bold">$</text>
    <line x1="15" y1="70" x2="75" y2="70" stroke="url(#grad1)" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Cursor blink (blinking line) -->
    <rect x="5" y="82" width="3" height="2" fill="url(#grad1)" opacity="0.8"/>
  </g>
</svg>