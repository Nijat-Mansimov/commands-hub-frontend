<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2e4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Accent bars -->
  <rect x="0" y="0" width="1200" height="8" fill="url(#accentGrad)"/>
  <rect x="0" y="622" width="1200" height="8" fill="url(#accentGrad)"/>
  
  <!-- Left panel - Terminal visual -->
  <g transform="translate(60, 100)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="320" height="430" fill="rgba(15, 23, 42, 0.8)" stroke="url(#accentGrad)" stroke-width="3" rx="12"/>
    
    <!-- Terminal header -->
    <rect x="0" y="0" width="320" height="35" fill="url(#accentGrad)" rx="12" rx="12"/>
    <circle cx="20" cy="17.5" r="4" fill="#ff6b6b"/>
    <circle cx="50" cy="17.5" r="4" fill="#ffd93d"/>
    <circle cx="80" cy="17.5" r="4" fill="#6bcf7f"/>
    <text x="130" y="25" font-family="monospace" font-size="14" fill="#fff" text-anchor="middle">commands@hub</text>
    
    <!-- Terminal content -->
    <text x="15" y="75" font-family="monospace" font-size="13" fill="#00d4ff">$ deploy --template</text>
    <text x="15" y="110" font-family="monospace" font-size="12" fill="#6bcf7f">✓ Authentication</text>
    <text x="15" y="145" font-family="monospace" font-size="12" fill="#6bcf7f">✓ Validation</text>
    <text x="15" y="180" font-family="monospace" font-size="12" fill="#6bcf7f">✓ Generation</text>
    <text x="15" y="220" font-family="monospace" font-size="11" fill="#00d4ff">Command generated:</text>
    <text x="15" y="250" font-family="monospace" font-size="10" fill="#fff" opacity="0.8">python exploit.py -t host</text>
    <text x="15" y="280" font-family="monospace" font-size="10" fill="#fff" opacity="0.8">--port 8080 --verbose</text>
    <text x="15" y="315" font-family="monospace" font-size="13" fill="#00d4ff">$ █</text>
  </g>
  
  <!-- Right panel - Title and description -->
  <g transform="translate(450, 110)">
    <!-- Main title -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="#fff">Commands-HUB</text>
    
    <!-- Subtitle -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="28" fill="url(#accentGrad)">Attack Command Repository</text>
    
    <!-- Description lines -->
    <text x="0" y="150" font-family="Arial, sans-serif" font-size="18" fill="#9ca3af">Share • Discover • Execute</text>
    
    <!-- Feature bullets -->
    <circle cx="0" cy="215" r="5" fill="url(#accentGrad)"/>
    <text x="20" y="222" font-family="Arial, sans-serif" font-size="16" fill="#e5e7eb">Dynamic command templates</text>
    
    <circle cx="0" cy="270" r="5" fill="url(#accentGrad)"/>
    <text x="20" y="277" font-family="Arial, sans-serif" font-size="16" fill="#e5e7eb">Community-driven security</text>
    
    <circle cx="0" cy="325" r="5" fill="url(#accentGrad)"/>
    <text x="20" y="332" font-family="Arial, sans-serif" font-size="16" fill="#e5e7eb">Tested attack payloads</text>
    
    <!-- CTA text -->
    <text x="0" y="420" font-family="Arial, sans-serif" font-size="16" fill="#00d4ff" font-weight="bold">Explore Commands-HUB →</text>
  </g>
</svg>